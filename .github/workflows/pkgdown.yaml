# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          # cmdstanr is a Suggests but is NOT on CRAN -- without this, pak
          # cannot resolve it and dependency solving fails outright.
          extra-repositories: https://stan-dev.r-universe.dev

      # `dependencies: '"hard"'` deliberately skips Suggests. Nothing built
      # here needs a Stan backend: the vignette is precompiled from
      # pairedcountbrms.Rmd.orig (see vignettes/precompile.R) so its results
      # are already baked in, and the articles are pure R. Installing cmdstanr
      # would be actively harmful -- the package would be present but the
      # cmdstan binary would not, so anything that tried to sample would fail.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::pkgdown
            any::knitr
            any::rmarkdown
            local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
